name: 购买或服务咨询
description: 咨询数字工具或简历服务，请勿提交隐私材料
title: "[咨询] "
body:
  - type: dropdown
    id: product
    attributes:
      label: 想咨询的内容
      options:
        - 个人预算与存钱计划表（9.9 元）
        - 简历岗位匹配诊断工具（19.9 元）
        - 双工具组合包（24.9 元）
        - 简历快速诊断（9.9 元）
        - 一页简历基础优化（39.9 元）
        - 岗位定制优化（99 元）
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: 想了解的问题
      description: 请勿粘贴简历、手机号、邮箱、证件、收款信息或其他隐私内容。
      placeholder: 例如：我想确认 WPS 是否能打开预算模板。
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我没有在公开咨询中提交隐私或付款信息。
          required: true
